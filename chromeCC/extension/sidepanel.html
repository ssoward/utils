<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ChromeCC</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="header-left">
        <span id="logo">CC</span>
        <span id="title">Claude Code</span>
      </div>
      <button id="new-chat" title="New chat">&#x1f5d1;</button>
    </div>
    <div id="page-context"></div>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="input" placeholder="Ask about this page..." rows="1"></textarea>
      <button id="send" title="Send">&#x2191;</button>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
